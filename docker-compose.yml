services:
  wikifetcher-api:
    build: ./api
    container_name: wikifetcher-api
    restart: unless-stopped
    environment:
      ZIM_DATA_PATH: /data/zim
      DB_PATH: /data/db/wikifetcher.sqlite
      KIWIX_CONTAINER_NAME: kiwix-serve
      DEFAULT_CRON: "${DEFAULT_CRON:-0 3 * * 0}"
      DEFAULT_MAX_VERSIONS: "${DEFAULT_MAX_VERSIONS:-3}"
      KIWIX_PORT: "${KIWIX_PORT:-8080}"
      ZIM_VOLUME_PATH: wikifetcher_zim-data
      DOCKER_NETWORK: wikifetcher_default
    volumes:
      - zim-data:/data/zim
      - db-data:/data/db
      - /var/run/docker.sock:/var/run/docker.sock:ro
    expose:
      - "3000"

  wikifetcher-ui:
    build: ./ui
    container_name: wikifetcher-ui
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-8081}:80"
    depends_on:
      - wikifetcher-api

  kiwix-serve:
    image: ghcr.io/kiwix/kiwix-serve
    container_name: kiwix-serve
    restart: unless-stopped
    ports:
      - "${KIWIX_PORT:-8080}:8080"
    volumes:
      - zim-data:/data/zim:ro
    entrypoint: []
    command: ["sh", "-c", "if ls /data/zim/*/active.zim 1>/dev/null 2>&1; then exec kiwix-serve /data/zim/*/active.zim; else echo 'No ZIM files yet, waiting...' && sleep infinity; fi"]

volumes:
  zim-data:
  db-data:
